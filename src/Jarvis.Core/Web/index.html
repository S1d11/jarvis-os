<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="jarvis-shell">

    <!-- ═══ Desktop Area ════════════════════════════════════════ -->
    <div id="desktop">
      <div id="widget-layer"></div>
      <div id="window-container"></div>
    </div>

    <!-- ═══ Top Bar (clock + system tray area) ══════════════════ -->
    <div id="topbar">
      <div id="topbar-left">
        <div id="start-button" class="topbar-item" title="Start">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </div>
      </div>
      <div id="topbar-right">
        <div id="clock-widget" class="topbar-item" title="Quick Settings">
          <span id="clock-time">00:00</span>
          <span id="clock-date">—</span>
        </div>
        <div id="quick-settings-button" class="topbar-item" title="Quick Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v2M12 19v2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M3 12h2M19 12h2M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/>
            <circle cx="12" cy="12" r="3.5"/>
          </svg>
        </div>
        <div id="power-button" class="topbar-item" title="Power">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v8"/>
            <path d="M7.5 7a7 7 0 1 0 9 0"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- ═══ Dock ════════════════════════════════════════════════ -->
    <div id="dock-container">
      <div id="dock">
        <div class="dock-item dock-item-jarvis" data-app="jarvis" title="Jarvis">
          <div class="dock-orb"></div>
        </div>
        <div class="dock-separator"></div>
        <div id="dock-pinned"></div>
        <div class="dock-separator" id="dock-sep-running"></div>
        <div id="dock-running"></div>
        <div class="dock-spacer"></div>
        <div class="dock-item" data-action="start" title="All Apps">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
            <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
            <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- ═══ Assistant Panel ══════════════════════════════════════ -->
    <div id="assistant-panel" class="panel hidden">
      <div class="panel-header">
        <div class="panel-header-orb">
          <div class="orb-ring"></div>
          <div class="orb-core"></div>
        </div>
        <div class="panel-header-title">Jarvis</div>
        <div class="panel-header-status" id="assistant-status">Ready</div>
        <button class="panel-close" id="assistant-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
        </button>
      </div>
      <div id="chat-feed"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Ask Jarvis anything…" rows="1"></textarea>
        <button id="chat-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ═══ Quick Settings ═══════════════════════════════════════ -->
    <div id="quick-settings" class="panel hidden">
      <div class="qs-tiles">
        <div class="qs-tile" id="qs-wifi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.5a10 10 0 0 1 14 0M8 15.5a6 6 0 0 1 8 0M11 18.5a2 2 0 0 1 2 0"/>
            <circle cx="12" cy="20" r="0.5" fill="currentColor"/>
          </svg>
          <span>Wi-Fi</span>
        </div>
        <div class="qs-tile" id="qs-bt">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 7l10 10-5 5V2l5 5L7 17"/>
          </svg>
          <span>Bluetooth</span>
        </div>
        <div class="qs-tile" id="qs-airplane">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/>
          </svg>
          <span>Airplane</span>
        </div>
        <div class="qs-tile" id="qs-night">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
          <span>Night Light</span>
        </div>
      </div>
      <div class="qs-sliders">
        <div class="qs-slider-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>
          </svg>
          <input type="range" id="qs-volume" min="0" max="100" value="50">
          <span class="qs-value" id="qs-volume-value">50</span>
        </div>
        <div class="qs-slider-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
          </svg>
          <input type="range" id="qs-brightness" min="0" max="100" value="100">
          <span class="qs-value" id="qs-brightness-value">100</span>
        </div>
      </div>
      <div class="qs-footer">
        <div class="qs-footer-item" id="qs-lock">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          Lock
        </div>
        <div class="qs-footer-item qs-danger" id="qs-shutdown">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v8"/><path d="M7.5 7a7 7 0 1 0 9 0"/>
          </svg>
          Shut down
        </div>
      </div>
    </div>

    <!-- ═══ Power Menu ═══════════════════════════════════════════ -->
    <div id="power-menu" class="panel hidden">
      <div class="power-item" data-action="lock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        Lock
      </div>
      <div class="power-item" data-action="restart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        Restart
      </div>
      <div class="power-item" data-action="sleep">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
        Sleep
      </div>
      <div class="power-item" data-action="logoff">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Sign out
      </div>
      <div class="power-divider"></div>
      <div class="power-item power-danger" data-action="shutdown">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4v8"/><path d="M7.5 7a7 7 0 1 0 9 0"/>
        </svg>
        Shut down
      </div>
    </div>

    <!-- ═══ Start Menu ═══════════════════════════════════════════ -->
    <div id="start-menu" class="panel hidden">
      <div id="start-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
        <input type="text" id="start-search-input" placeholder="Search apps…" autocomplete="off">
      </div>
      <div id="start-apps"></div>
    </div>

  </div>

  <script src="md.js"></script>
  <script src="app.js"></script>
</body>
</html>
