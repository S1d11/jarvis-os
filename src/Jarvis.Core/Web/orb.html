<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="orb.css">
</head>
<body>

  <!-- ═══ COMPACT MODE — floating orb ═══════════════════════════ -->
  <div id="orb-compact">
    <div id="orb-stage">
      <div id="orb-glow"></div>
      <div id="orb-outer-ring"></div>
      <div id="orb-mid-ring"></div>
      <div id="orb-core"></div>
      <div id="orb-shimmer"></div>
    </div>
  </div>

  <!-- ═══ FULLSCREEN MODE — Jarvis chatbot ══════════════════════ -->
  <div id="jarvis-fullscreen">

    <!-- Background ambient orb glow -->
    <div id="fs-ambient"></div>

    <!-- Top bar: orb + title + close -->
    <div id="fs-topbar">
      <div id="fs-orb-wrap">
        <div id="orb-stage-fs">
          <div id="orb-glow-fs"></div>
          <div id="orb-outer-ring-fs"></div>
          <div id="orb-mid-ring-fs"></div>
          <div id="orb-core-fs"></div>
        </div>
      </div>
      <div id="fs-title">Jarvis</div>
      <div id="fs-state-label">Listening…</div>
      <button id="fs-close" title="Back to orb (Esc)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Chat feed — centered, max-width for readability -->
    <div id="fs-chat-feed"></div>

    <!-- Bottom: input area with text + voice toggle -->
    <div id="fs-input-bar">
      <div id="fs-input-wrap">
        <textarea id="fs-input" placeholder="Type to Jarvis…" rows="1"></textarea>
        <button id="fs-send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
      <div id="fs-mode-toggle">
        <button id="fs-voice-btn" class="fs-mode-btn active" title="Voice mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span>Voice</span>
        </button>
        <button id="fs-text-btn" class="fs-mode-btn" title="Text mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Type</span>
        </button>
      </div>
    </div>

  </div>

  <script src="orb.js"></script>
</body>
</html>
