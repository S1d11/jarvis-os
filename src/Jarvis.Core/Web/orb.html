<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="orb.css">
</head>
<body>

  <!-- ═══ COMPACT MODE — floating orb ═══════════════════════════ -->
  <div id="orb-compact">
    <div id="orb-stage">
      <div id="orb-glow"></div>
      <div id="orb-outer-ring"></div>
      <div id="orb-mid-ring"></div>
      <div id="orb-core"></div>
      <div id="orb-shimmer"></div>
    </div>
  </div>

  <!-- ═══ FULLSCREEN MODE — Jarvis chatbot ══════════════════════ -->
  <div id="jarvis-fullscreen">

    <!-- Background ambient orb glow -->
    <div id="fs-ambient"></div>

    <!-- Top bar: orb + title + close -->
    <div id="fs-topbar">
      <div id="fs-orb-wrap">
        <div id="orb-stage-fs">
          <div id="orb-glow-fs"></div>
          <div id="orb-outer-ring-fs"></div>
          <div id="orb-mid-ring-fs"></div>
          <div id="orb-core-fs"></div>
        </div>
      </div>
      <div id="fs-title">Jarvis</div>
      <div id="fs-state-label">Listening…</div>
      <button id="fs-close" title="Back to orb (Esc)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Chat feed — centered, max-width for readability -->
    <div id="fs-chat-feed"></div>

    <!-- Bottom: input bar with embedded mode toggle -->
    <div id="fs-input-bar">
      <div id="fs-input-wrap">
        <!-- Mode toggle icon (left side, inside the bar) -->
        <button id="fs-mode-icon" class="fs-icon-btn" title="Switch to voice">
          <!-- Mic icon (shown when in text mode — click to switch to voice) -->
          <svg id="icon-mic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
          <!-- Keyboard icon (shown when in voice mode — click to switch to text) -->
          <svg id="icon-keyboard" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <path d="M6 10h0M10 10h0M14 10h0M18 10h0M6 14h0M18 14h0"/>
            <path d="M9 14h6"/>
          </svg>
        </button>
        <textarea id="fs-input" placeholder="Type to Jarvis…" rows="1"></textarea>
        <button id="fs-send" class="fs-icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="orb.js"></script>
</body>
</html>
