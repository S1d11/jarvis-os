<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="orb.css">
</head>
<body>

  <!-- ═══ Compact Mode — just the floating orb ══════════════════ -->
  <div id="orb-compact">
    <div id="orb-stage">
      <div id="orb-glow"></div>
      <div id="orb-outer-ring"></div>
      <div id="orb-mid-ring"></div>
      <div id="orb-core"></div>
      <div id="orb-shimmer"></div>
    </div>
  </div>

  <!-- ═══ Expanded Mode — orb + chat panel ══════════════════════ -->
  <div id="orb-expanded">

    <!-- Orb header (also the drag handle) -->
    <div id="orb-header">
      <div id="orb-stage-mini">
        <div id="orb-glow-mini"></div>
        <div id="orb-outer-ring-mini"></div>
        <div id="orb-mid-ring-mini"></div>
        <div id="orb-core-mini"></div>
      </div>
      <div id="orb-title">Jarvis</div>
      <div id="orb-state-label">Listening…</div>
      <button id="orb-close" title="Collapse">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Chat feed -->
    <div id="orb-chat-feed"></div>

    <!-- Input area -->
    <div id="orb-input-area">
      <textarea id="orb-input" placeholder="Ask Jarvis…" rows="1"></textarea>
      <button id="orb-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <div id="orb-footer">
      <button id="orb-full" class="orb-footer-btn">Open full view</button>
      <button id="orb-dismiss" class="orb-footer-btn">Dismiss</button>
    </div>

  </div>

  <script src="orb.js"></script>
</body>
</html>
