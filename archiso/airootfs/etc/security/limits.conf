# Jarvis OS — Security limits

# Lock down core dumps (security)
* hard core 0
* soft core 0

# Increase file descriptor limit for Jarvis (handles many concurrent connections)
* soft nofile 65536
* hard nofile 131072

# Real-time priority for audio (PipeWire)
@audio - rtprio 95
@audio - memlock unlimited

# Jarvis user can use real-time scheduling
jarvis - rtprio 90
jarvis - memlock 268435456
