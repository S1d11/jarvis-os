# Jarvis OS — Syslinux configuration for BIOS boot

DEFAULT jarvis
PROMPT 1
TIMEOUT 30

LABEL jarvis
    MENU LABEL Jarvis OS
    LINUX /jarvis/boot/x86_64/vmlinuz-linux
    INITRD /jarvis/boot/intel-ucode.img,/jarvis/boot/amd-ucode.img,/jarvis/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3

LABEL jarvis-nvidia
    MENU LABEL Jarvis OS (NVIDIA proprietary)
    LINUX /jarvis/boot/x86_64/vmlinuz-linux
    INITRD /jarvis/boot/intel-ucode.img,/jarvis/boot/amd-ucode.img,/jarvis/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 nvidia-drm.modeset=1

LABEL jarvis-safe
    MENU LABEL Jarvis OS (safe mode — no KMS)
    LINUX /jarvis/boot/x86_64/vmlinuz-linux
    INITRD /jarvis/boot/intel-ucode.img,/jarvis/boot/amd-ucode.img,/jarvis/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw nomodeset loglevel=3

LABEL jarvis-debug
    MENU LABEL Jarvis OS (debug)
    LINUX /jarvis/boot/x86_64/vmlinuz-linux
    INITRD /jarvis/boot/intel-ucode.img,/jarvis/boot/amd-ucode.img,/jarvis/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw debug loglevel=7

LABEL jarvis-secure
    MENU LABEL Jarvis OS (Secure Boot + TPM)
    LINUX /jarvis/boot/x86_64/vmlinuz-linux
    INITRD /jarvis/boot/intel-ucode.img,/jarvis/boot/amd-ucode.img,/jarvis/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 tpm_tis.force=1 tpm_tis.interrupts=0 lockdown=confidentiality

ONTIMEOUT jarvis
