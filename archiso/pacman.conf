# Jarvis OS pacman configuration
# Based on Arch Linux pacman.conf with multilib enabled for Wine/Proton

[options]
HoldPkg = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── Core repos ───────────────────────────────────────────────
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# ── Multilib (32-bit — required for Wine/Proton) ─────────────
[multilib]
Include = /etc/pacman.d/mirrorlist

# ── Chaotic-AUR (prebuilt AUR packages — Wine-GE, Proton, etc) ──
[chaotic-aur]
Server = https://cdn-mirror.chaotic.cx/$repo/$arch
SigLevel = Optional TrustAll

# ── Jarvis OS custom repo (Jarvis builds, custom kernels) ────
[jarvis-os]
Server = https://github.com/S1d11/jarvis-os/releases/download/repo/$arch
SigLevel = Optional TrustAll
