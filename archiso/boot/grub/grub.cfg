# Jarvis OS — GRUB configuration for UEFI boot
# This is the GRUB config embedded in the ISO.

set default="0"
set timeout="10"
set gfxmode=auto
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod png
insmod gettext

loadfont /boot/grub/fonts/unicode.pf2

set menu_color_normal=light-blue/black
set menu_color_highlight=blue/light-gray

# ── Jarvis OS (default) ──────────────────────────────────────
menuentry "Jarvis OS" --class jarvis --class os {
    set gfxpayload=keep
    linux /jarvis/boot/x86_64/vmlinuz-linux archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 systemd.show_status=1 udev.log_level=3
    initrd /jarvis/boot/intel-ucode.img /jarvis/boot/amd-ucode.img /jarvis/boot/x86_64/initramfs-linux.img
}

# ── Jarvis OS with NVIDIA proprietary drivers ────────────────
menuentry "Jarvis OS (NVIDIA proprietary)" --class jarvis --class os {
    set gfxpayload=keep
    linux /jarvis/boot/x86_64/vmlinuz-linux archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 nvidia-drm.modeset=1 systemd.show_status=1 udev.log_level=3
    initrd /jarvis/boot/intel-ucode.img /jarvis/boot/amd-ucode.img /jarvis/boot/x86_64/initramfs-linux.img
}

# ── Jarvis OS (safe mode — no KMS) ───────────────────────────
menuentry "Jarvis OS (safe mode)" --class jarvis --class os {
    set gfxpayload=text
    linux /jarvis/boot/x86_64/vmlinuz-linux archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw nomodeset loglevel=3
    initrd /jarvis/boot/intel-ucode.img /jarvis/boot/amd-ucode.img /jarvis/boot/x86_64/initramfs-linux.img
}

# ── Jarvis OS (debug — verbose logging) ──────────────────────
menuentry "Jarvis OS (debug)" --class jarvis --class os {
    set gfxpayload=keep
    linux /jarvis/boot/x86_64/vmlinuz-linux archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw debug loglevel=7 systemd.log_level=debug udev.log_level=debug
    initrd /jarvis/boot/intel-ucode.img /jarvis/boot/amd-ucode.img /jarvis/boot/x86_64/initramfs-linux.img
}

# ── Jarvis OS (TPM 2.0 + Secure Boot enforcement) ────────────
menuentry "Jarvis OS (Secure Boot + TPM)" --class jarvis --class os {
    set gfxpayload=keep
    linux /jarvis/boot/x86_64/vmlinuz-linux archisobasedir=jarvis archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 tpm_tis.force=1 tpm_tis.interrupts=0 lockdown=confidentiality
    initrd /jarvis/boot/intel-ucode.img /jarvis/boot/amd-ucode.img /jarvis/boot/x86_64/initramfs-linux.img
}

# ── Memtest86+ ───────────────────────────────────────────────
menuentry "Run Memtest86+" --class memtest --class tool {
    linux16 /boot/memtest86+/memtest.bin
}

# ── Reboot / Power off ───────────────────────────────────────
menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Power off" --class shutdown {
    halt
}
